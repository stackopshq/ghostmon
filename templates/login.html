{% extends "base.html" %}

{% block title %}Sign in · GhostMonitor{% endblock %}

{% block header_actions %}{% endblock %}

{% block page %}
<main class="page-bg">
  <div class="auth-wrap">
    <div class="card auth-card">
      <h1>Sign in</h1>
      <p class="auth-sub">Access your GhostMonitor dashboard.</p>

      {% if error %}
      <div class="flash flash-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login" class="stacked">
        <label class="field">
          <span>Email</span>
          <input type="email" name="email" required autocomplete="email" autofocus>
        </label>
        <label class="field">
          <span>Password</span>
          <input type="password" name="password" required autocomplete="current-password" minlength="12">
        </label>
        <button type="submit" class="btn-primary">Sign in</button>
      </form>

      <div class="divider">or</div>

      <a
        href="{% if oidc_enabled %}/api/auth/oidc/login{% else %}#{% endif %}"
        class="btn-oidc"
        {% if not oidc_enabled %}aria-disabled="true" title="OIDC is disabled"{% endif %}>
        Continue with SSO (OIDC)
      </a>
    </div>
  </div>
</main>
{% endblock %}
