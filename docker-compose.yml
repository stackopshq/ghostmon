services:
  postgres:
    image: postgres:16-alpine
    container_name: ghostmon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ghostmon
      POSTGRES_PASSWORD: ghostmon
      POSTGRES_DB: ghostmon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghostmon -d ghostmon"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ghostmon-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-please-use-a-strong-random-secret}
      DATABASE_URL: postgresql+asyncpg://ghostmon:ghostmon@postgres:5432/ghostmon
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TTL_MINUTES: "60"
      OIDC_ENABLED: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: ghostmon-prometheus
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  postgres_data:
